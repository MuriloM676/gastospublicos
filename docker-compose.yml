services:
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastospublicos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastospublicos}
      POSTGRES_DB: ${POSTGRES_DB:-gastospublicos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastospublicos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: gp-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gastospublicos}:${POSTGRES_PASSWORD:-gastospublicos}@postgres:5432/${POSTGRES_DB:-gastospublicos}
      PORT: ${BACKEND_PORT:-3001}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: gp-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
